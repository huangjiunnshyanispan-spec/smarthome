<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧家居控制中心</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1>智慧家居控制中心</h1>
        <div class="device-grid" id="device-grid">
            <!-- 裝置卡片將通過JavaScript動態生成 -->
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function getStatusMeta(status) {
            const normalizedStatus = String(status ?? '').trim().toLowerCase();
            const isOnline = normalizedStatus !== '' && normalizedStatus !== '離線' && normalizedStatus !== 'offline';

            return {
                text: isOnline ? '連線' : '離線',
                className: isOnline ? 'status-online' : 'status-offline'
            };
        }

        function updateDeviceGrid(signals) {
            const grid = document.getElementById('device-grid');
            const devices = [
                { key: 'smartDesk', name: '智慧桌面助理' },
                { key: 'petFeeder', name: '寵物餵食機' },
                { key: 'lighting', name: '燈光控制系統' },
                { key: 'surveillance', name: '影像監控系統' },
                { key: 'smartGarage', name: '智慧車庫' },
                { key: 'microphone', name: '麥克風播報系統' }
            ];

            grid.innerHTML = devices.map(device => {
                const { text, className } = getStatusMeta(signals[device.key]);
                return `
                    <div class="device-card">
                        <h2>${device.name}</h2>
                        <p class="status-text">狀態: <span class="${className}">${text}</span></p>
                        <div class="button-group">
                            <button onclick="viewDetails('${device.key}')" class="view-btn">查看詳情</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function sendControl(deviceKey, command) {
            socket.emit('webControl', { device: deviceKey, cmd: command });
        }

        function viewDetails(deviceKey) {
            window.location.href = `/device/${deviceKey}`;
        }

        socket.on('updateSignals', (signals) => {
            updateDeviceGrid(signals);
        });
    </script>
</body>
</html>
